

.cat > /mnt/user-data/outputs/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cloud Vault — Secure Cloud Storage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue2:#1D4ED8;--blue3:#EFF6FF;
  --text:#0F172A;--sub:#64748B;--border:#E2E8F0;
  --white:#FFFFFF;--bg:#F8FAFC;--red:#EF4444;--green:#10B981;
}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* LOADING */
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;transition:opacity .5s;}
.ld-icon{width:72px;height:72px;background:linear-gradient(135deg,#2563EB,#60A5FA);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;animation:ldpop 1.4s ease infinite;}
@keyframes ldpop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.ld-name{font-size:20px;font-weight:800;color:var(--text);}
.ld-dots{display:flex;gap:7px;}
.ld-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);animation:lddot 1.2s ease infinite;}
.ld-dot:nth-child(2){animation-delay:.18s}.ld-dot:nth-child(3){animation-delay:.36s}
@keyframes lddot{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-8px);opacity:.5}}

/* AUTH */
#auth-screen{display:none;min-height:100vh;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-icon{width:36px;height:36px;background:linear-gradient(135deg,#2563EB,#60A5FA);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.nav-name{font-size:18px;font-weight:800;}
.hero{padding:40px 24px 32px;max-width:480px;margin:0 auto;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:var(--blue3);border:1px solid #BFDBFE;border-radius:100px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--blue);margin-bottom:22px;}
.hero-h1{font-size:36px;font-weight:900;line-height:1.12;margin-bottom:14px;}
.hero-h1 em{color:var(--blue);font-style:normal;text-decoration:underline;text-underline-offset:5px;}
.hero-sub{font-size:15px;color:var(--sub);line-height:1.65;margin-bottom:28px;}
.hero-users{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.avatars{display:flex;}
.avatars span{width:32px;height:32px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--blue3);margin-left:-10px;}
.avatars span:first-child{margin-left:0;}
.hero-users-txt{font-size:13px;color:var(--sub);}
.hero-users-txt strong{color:var(--text);}

/* AUTH CARD */
.auth-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:26px 24px;box-shadow:0 4px 32px rgba(0,0,0,.07);margin-bottom:32px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:20px;gap:4px;}
.auth-tab{flex:1;padding:11px;border:none;border-radius:8px;background:transparent;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .2s;}
.auth-tab.on{background:#fff;color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.1);}
.aerr{background:#FEF2F2;border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;}
.field-wrap{position:relative;}
.field-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}
.field input{width:100%;padding:13px 14px 13px 40px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s;}
.field input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.field input::placeholder{color:#CBD5E1;}
.btn-auth{width:100%;padding:14px;background:var(--blue);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:14px;}
.btn-auth:hover{background:var(--blue2);}
.auth-or{text-align:center;position:relative;margin:14px 0;}
.auth-or::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
.auth-or span{background:#fff;padding:0 12px;position:relative;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1px;}
.socials{display:flex;flex-direction:column;gap:10px;}
.btn-google{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.btn-google:hover{border-color:#4285F4;color:#4285F4;}
.btn-google svg{width:20px;height:20px;flex-shrink:0;}
.auth-terms{text-align:center;font-size:11px;color:var(--sub);margin-top:14px;}
.auth-terms a{color:var(--blue);font-weight:600;text-decoration:none;}

/* APP */
#app-screen{display:none;min-height:100vh;background:var(--bg);}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.top-left{display:flex;align-items:center;gap:10px;}
.top-icon{width:34px;height:34px;background:linear-gradient(135deg,#2563EB,#60A5FA);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.top-name{font-size:16px;font-weight:800;}
.top-right{display:flex;align-items:center;gap:8px;}
.top-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#2563EB,#60A5FA);overflow:hidden;}
.top-av img{width:100%;height:100%;object-fit:cover;}
.btn-out{padding:6px 13px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-out:hover{color:var(--red);border-color:#FECACA;}

/* VIEWS */
.wrap{padding:16px;max-width:600px;margin:0 auto;padding-bottom:90px;}

/* STORAGE CARD */
.store-card{background:linear-gradient(135deg,#1E40AF,#2563EB,#3B82F6);border-radius:20px;padding:20px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden;}
.store-card::after{content:'☁️';position:absolute;right:-8px;top:-8px;font-size:90px;opacity:.1;transform:rotate(-15deg);}
.sc-greet{font-size:13px;opacity:.75;margin-bottom:3px;}
.sc-name{font-size:19px;font-weight:800;margin-bottom:14px;}
.sc-bar-bg{background:rgba(255,255,255,.2);border-radius:100px;height:6px;margin-bottom:7px;}
.sc-bar{height:100%;background:#fff;border-radius:100px;transition:width .6s;}
.sc-info{display:flex;justify-content:space-between;font-size:12px;opacity:.75;}

/* USER ID CARD */
.uid-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.uid-ico{font-size:22px;}
.uid-info{flex:1;}
.uid-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;}
.uid-val{font-size:15px;font-weight:700;color:var(--blue);font-family:'Courier New',monospace;letter-spacing:1px;}
.uid-copy{padding:7px 14px;background:var(--blue3);border:none;border-radius:8px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;font-family:'Inter',sans-serif;}

/* UPLOAD */
.upload-box{background:#fff;border:2px dashed var(--border);border-radius:16px;padding:24px 20px;text-align:center;cursor:pointer;position:relative;transition:all .3s;margin-bottom:16px;}
.upload-box:hover,.upload-box.drag{border-color:var(--blue);background:var(--blue3);}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.up-ico{font-size:32px;margin-bottom:8px;}
.up-t{font-size:14px;font-weight:700;margin-bottom:3px;}
.up-s{font-size:12px;color:var(--sub);}
.up-badge{display:inline-block;margin-top:12px;padding:8px 22px;background:var(--blue);border-radius:20px;color:#fff;font-size:13px;font-weight:600;}
.up-prog{margin-top:12px;display:none;}
.prog-bg{background:var(--border);border-radius:100px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:100px;width:0%;transition:width .3s;}
.prog-lbl{font-size:12px;color:var(--sub);margin-top:6px;}

/* QUICK ACCESS */
.qa-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.qa-item{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.qa-item:hover{border-color:var(--blue);transform:translateY(-2px);}
.qa-ico{font-size:24px;display:block;margin-bottom:5px;}
.qa-lbl{font-size:11px;font-weight:600;color:var(--sub);}

/* SEARCH & FILTER */
.srch-wrap{position:relative;margin-bottom:12px;}
.srch-wrap input{width:100%;padding:12px 14px 12px 42px;background:#fff;border:1.5px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s;}
.srch-wrap input:focus{border-color:var(--blue);}
.srch-wrap input::placeholder{color:#CBD5E1;}
.srch-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}
.ftabs{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{padding:7px 14px;background:#fff;border:1.5px solid var(--border);border-radius:100px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .2s;}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* FILE LIST */
.flist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.flist-title{font-size:15px;font-weight:700;}
.flist-count{font-size:12px;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:100px;font-weight:600;}
.flist{display:flex;flex-direction:column;}
.fitem{background:#fff;border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .2s;}
.fitem:first-child{border-radius:14px 14px 0 0;}.fitem:last-child{border-bottom:none;border-radius:0 0 14px 14px;}.fitem:only-child{border-radius:14px;}
.fitem:hover{background:var(--bg);}
.fi-thumb{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.fi-thumb.b{background:#EFF6FF;}.fi-thumb.p{background:#F5F3FF;}.fi-thumb.g{background:#F0FDF4;}.fi-thumb.o{background:#FFF7ED;}.fi-thumb.gr{background:var(--bg);}
.fi-thumb img,.fi-thumb video{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.fi-info{flex:1;min-width:0;}
.fi-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.fi-meta{font-size:12px;color:var(--sub);}
.fi-acts{display:flex;gap:5px;}
.fi-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.fi-btn:hover{border-color:var(--blue);background:var(--blue3);}
.fi-btn.del:hover{border-color:#FECACA;background:#FEF2F2;}

/* EMPTY */
.empty{background:#fff;border:1px solid var(--border);border-radius:14px;padding:44px 20px;text-align:center;}
.empty-ico{font-size:50px;display:block;margin-bottom:10px;opacity:.45;}
.empty-t{font-size:15px;font-weight:700;margin-bottom:4px;}
.empty-s{font-size:13px;color:var(--sub);}

/* CHAT SCREEN */
#cview{display:none;padding:0;max-width:600px;margin:0 auto;padding-bottom:90px;}
.chat-search-area{padding:16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:40;}
.chat-search-title{font-size:16px;font-weight:800;margin-bottom:12px;}
.csrch-wrap{position:relative;}
.csrch-wrap input{width:100%;padding:12px 14px 12px 42px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s;}
.csrch-wrap input:focus{border-color:var(--blue);}
.csrch-wrap input::placeholder{color:#CBD5E1;}
.csrch-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}
.csrch-btn{margin-top:10px;width:100%;padding:12px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.csrch-btn:hover{background:var(--blue2);}

.chat-list-area{padding:16px;}
.chat-list-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--sub);}
.chat-list{display:flex;flex-direction:column;gap:8px;}
.chat-user-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.chat-user-card:hover{border-color:var(--blue);transform:translateX(4px);}
.cuc-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#60A5FA);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;}
.cuc-av img{width:100%;height:100%;object-fit:cover;}
.cuc-info{flex:1;min-width:0;}
.cuc-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.cuc-id{font-size:11px;color:var(--sub);font-family:'Courier New',monospace;}
.cuc-msg{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.cuc-time{font-size:11px;color:var(--sub);flex-shrink:0;}

/* CHAT WINDOW */
#chat-window{display:none;position:fixed;inset:0;background:#fff;z-index:100;flex-direction:column;}
.cw-header{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.cw-back{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cw-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#60A5FA);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0;}
.cw-av img{width:100%;height:100%;object-fit:cover;}
.cw-info{flex:1;}
.cw-name{font-size:15px;font-weight:800;}
.cw-id{font-size:11px;color:var(--sub);font-family:'Courier New',monospace;}
.cw-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg);}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.mine{align-items:flex-end;}
.msg-wrap.theirs{align-items:flex-start;}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;}
.msg-wrap.mine .msg-bubble{background:var(--blue);color:#fff;border-radius:16px 16px 4px 16px;}
.msg-wrap.theirs .msg-bubble{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:16px 16px 16px 4px;}
.msg-bubble img{max-width:200px;border-radius:10px;display:block;margin-top:6px;}
.msg-bubble video{max-width:200px;border-radius:10px;display:block;margin-top:6px;}
.msg-time{font-size:10px;color:var(--sub);margin-top:3px;padding:0 4px;}
.cw-input{background:#fff;border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;}
.cw-input input{flex:1;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:22px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s;}
.cw-input input:focus{border-color:var(--blue);}
.cw-attach{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.cw-attach input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.cw-send{width:38px;height:38px;border-radius:50%;background:var(--blue);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.cw-send:hover{background:var(--blue2);}

/* PROFILE */
#pview{display:none;padding:16px;max-width:600px;margin:0 auto;padding-bottom:90px;}
.prof-hero{background:linear-gradient(135deg,#1E40AF,#2563EB);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;}
.prof-hero::after{content:'☁️';position:absolute;right:16px;top:10px;font-size:56px;opacity:.12;}
.prof-av{width:72px;height:72px;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 12px;overflow:hidden;}
.prof-av img{width:100%;height:100%;object-fit:cover;}
.prof-name{font-size:18px;font-weight:800;color:#fff;}
.prof-email{font-size:13px;color:rgba(255,255,255,.7);margin-top:3px;}
.prof-uid{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;font-family:'Courier New',monospace;}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);background:#fff;border-radius:14px;margin-top:18px;overflow:hidden;}
.pstat{padding:14px 8px;text-align:center;border-right:1px solid var(--border);}
.pstat:last-child{border-right:none;}
.pstat-n{font-size:20px;font-weight:800;color:var(--blue);display:block;}
.pstat-l{font-size:11px;color:var(--sub);font-weight:600;}
.info-card{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.irow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;}
.irow:last-child{border-bottom:none;}
.irow:hover{background:var(--bg);}
.irow-ico{width:38px;height:38px;border-radius:10px;background:var(--blue3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.irow-ico.red{background:#FEF2F2;}
.irow-t{font-size:14px;font-weight:600;color:var(--text);}
.irow-s{font-size:12px;color:var(--sub);margin-top:2px;}
.irow-arr{margin-left:auto;color:#CBD5E1;font-size:18px;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:50;padding:5px 0 calc(5px + env(safe-area-inset-bottom));}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 8px;border:none;background:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.bni-ico{font-size:21px;}
.bni-lbl{font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;}
.bni.on .bni-lbl{color:var(--blue);}
.bni-dot{width:5px;height:5px;border-radius:50%;background:transparent;transition:all .2s;}
.bni.on .bni-dot{background:var(--blue);}
.bni-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX
